name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web assets
        env:
          BUILD_TARGET: android
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GITHUB_ISSUES_TOKEN: ${{ secrets.VITE_GITHUB_ISSUES_TOKEN }}
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Set minSdkVersion to 26 for Health Connect
        run: sed -i 's/minSdkVersion = 24/minSdkVersion = 26/' android/variables.gradle

      - name: Add Health Connect permissions to manifest
        run: |
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.health.WRITE_EXERCISE" />\n    <uses-permission android:name="android.permission.health.READ_EXERCISE" />\n    <queries>\n        <package android:name="com.google.android.apps.healthdata" />\n    </queries>\n</manifest>|' android/app/src/main/AndroidManifest.xml

      - name: Patch kiwi-health plugin to pin Kotlin JVM target to 17
        run: |
          python3 << 'PYEOF'
          path = 'node_modules/@kiwi-health/capacitor-health-connect/android/build.gradle'
          content = open(path).read()
          old = '    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_17\n        targetCompatibility JavaVersion.VERSION_17\n    }'
          new = old + '\n    kotlinOptions {\n        jvmTarget = "17"\n    }'
          open(path, 'w').write(content.replace(old, new, 1))
          PYEOF

      - name: Sync Capacitor plugins
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LIFT-android
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
